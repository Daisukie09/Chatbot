<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Chat</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <div class="logo-icon">
            <i class="fas fa-brain"></i>
          </div>
          <span>Claude Chat</span>
        </div>
        <button class="new-chat-btn" id="newChatBtn">
          <i class="fas fa-plus"></i>
          <span>New Chat</span>
        </button>
      </div>

      <div class="sidebar-chats" id="chatHistory"></div>

      <div class="sidebar-bottom">
        <div class="model-badge">
          <i class="fas fa-microchip"></i>
          <span>opus-4-6-thinking</span>
        </div>

        <div class="setting-row">
          <span><i class="fas fa-bolt"></i> Streaming</span>
          <label class="toggle">
            <input type="checkbox" id="streamToggle" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="setting-row">
          <span><i class="fas fa-lightbulb"></i> Show Thinking</span>
          <label class="toggle">
            <input type="checkbox" id="thinkingToggle" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>

        <button class="danger-btn" id="clearAllBtn">
          <i class="fas fa-trash"></i> Clear All Chats
        </button>
      </div>
    </aside>

    <!-- Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main -->
    <main class="main">
      <header class="header">
        <button class="icon-btn" id="toggleSidebar">
          <i class="fas fa-bars"></i>
        </button>
        <h1 id="chatTitle">New Chat</h1>
        <div class="header-badge">
          <span class="status-dot"></span>
          Claude Opus 4.6
        </div>
      </header>

      <div class="chat-area" id="chatArea">
        <!-- Welcome -->
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-icon">
            <i class="fas fa-brain"></i>
          </div>
          <h2>Claude Opus 4.6 Thinking</h2>
          <p class="welcome-sub">Extended thinking model with deep reasoning capabilities</p>
          <div class="suggestions">
            <button class="suggestion" onclick="useSuggestion('Explain how transformers work in AI, step by step')">
              <i class="fas fa-graduation-cap"></i>
              <span>Explain how transformers work in AI</span>
            </button>
            <button class="suggestion" onclick="useSuggestion('Write a Python binary search tree with insert, delete, and traversal')">
              <i class="fas fa-code"></i>
              <span>Write a Python binary search tree</span>
            </button>
            <button class="suggestion" onclick="useSuggestion('Compare React, Vue, and Svelte for a new project in 2025')">
              <i class="fas fa-scale-balanced"></i>
              <span>Compare React, Vue, and Svelte</span>
            </button>
            <button class="suggestion" onclick="useSuggestion('Help me design a database schema for an e-commerce app')">
              <i class="fas fa-database"></i>
              <span>Design a database schema</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-container">
        <div class="input-box">
          <textarea
            id="messageInput"
            placeholder="Message Claude..."
            rows="1"
          ></textarea>
          <div class="input-actions">
            <span class="char-count" id="charCount">0</span>
            <button class="send-btn" id="sendBtn" disabled title="Send message">
              <i class="fas fa-arrow-up"></i>
            </button>
            <button class="stop-btn hidden" id="stopBtn" title="Stop generating">
              <i class="fas fa-stop"></i>
            </button>
          </div>
        </div>
        <p class="footer-note">
          Claude Opus 4.6 Thinking via Orbit Provider • Extended thinking enabled
        </p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
